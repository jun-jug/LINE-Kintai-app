<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勤怠アプリ</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* 画面固定 */
    touch-action: none;
    overscroll-behavior: none;
    font-family: sans-serif;
    background: #f5f5f5;
  }

  #appContainer {
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 24px;
    text-align: center;
    box-sizing: border-box;
    font-size: 34px;
  }

  h2, h3 {
    font-size: 36px;
    margin-bottom: 20px;
  }

  select {
    width: 85%;
    padding: 30px;
    font-size: 34px;
    border-radius: 20px;
    border: 1px solid #ccc;
    margin-bottom: 40px;
    box-sizing: border-box;
  }

  /* 作業内容欄を半分の高さに */
  textarea {
    width: 85%;
    height: 180px; /* ←半分にした */
    padding: 20px;
    font-size: 30px;
    border-radius: 20px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ボタン1つだけ */
  .btn {
    width: 85%;
    padding: 50px;
    margin: 26px auto;
    font-size: 40px;
    border-radius: 26px;
    border: none;
    color: #fff;
    display: block;
    box-sizing: border-box;
  }

  .btn.arrival { background-color: #007bff; } /* 青：到着 */
  .btn.leave   { background-color: #dc3545; } /* 赤：退場 */
  .btn.disabled {
    background-color: #cccccc !important;
    color: #666 !important;
  }

  #nowTime {
    font-size: 36px;
    margin-bottom: 30px;
  }
</style>
</head>
<body>

<div id="appContainer">

  <h2>📍 現場名</h2>
  <select id="siteName" onchange="updateButtonState()">
    <option value="">現場を選択</option>
    <option value="工場A">工場A</option>
    <option value="工場B">工場B</option>
    <option value="店舗C">店舗C</option>
  </select>

  <h3>🕒 現在時刻</h3>
  <div id="nowTime"></div>

  <!-- ボタンは1つだけ -->
  <button id="mainBtn" class="btn disabled" onclick="handleMainButton()" disabled>
    到着（GPS打刻）
  </button>

  <h3>📝 作業内容</h3>
  <textarea id="workNote" placeholder="今日の作業内容を入力"></textarea>

</div>

<script>
  /* 現在時刻更新 */
  function updateTime() {
    const now = new Date();
    document.getElementById("nowTime").innerText =
      now.toLocaleString();
  }
  updateTime();
  setInterval(updateTime, 1000);

  let arrived = false; // 状態管理

  /* 現場選択 → ボタン有効化 */
  function updateButtonState() {
    const site = document.getElementById("siteName").value;
    const btn = document.getElementById("mainBtn");

    if (site !== "" && !arrived) {
      btn.disabled = false;
      btn.classList.remove("disabled");
      btn.classList.add("arrival");
      btn.innerText = "到着（GPS打刻）";
    }
  }

  /* ボタン押した時の動き */
  function handleMainButton() {
    const btn = document.getElementById("mainBtn");

    if (!arrived) {
      // 到着処理
      getGPS("arrival");
      arrived = true;

      btn.classList.remove("arrival");
      btn.classList.add("leave");
      btn.innerText = "退場（GPS打刻）";

    } else {
      // 退場処理
      getGPS("leave");
      arrived = false;

      btn.classList.remove("leave");
      btn.classList.add("disabled");
      btn.innerText = "到着（GPS打刻）";
      btn.disabled = true;
    }
  }

  /* GPS取得 */
  function getGPS(type) {
    navigator.geolocation.getCurrentPosition(() => {
      if (type === "arrival") {
        alert("今日もご安全に！");
      } else {
        alert("一日お疲れさまでした！");
      }
    });
  }

  /* textarea フォーカス解除 → 画面位置リセット */
  const textarea = document.getElementById("workNote");
  textarea.addEventListener("blur", () => {
    setTimeout(() => {
      window.scrollTo(0, 0);
    }, 100);
  });
</script>

</body>
</html>
