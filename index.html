<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勤怠アプリ</title>
<style>
  html, body {
    height: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;  /* スクロール禁止 */
    position: fixed;   /* 画面固定 */
  }

  body {
    font-family: sans-serif;
    padding: 24px;
    background: #f5f5f5;
    font-size: 26px; /* 大きめフォント */
  }

  h2, h3 {
    font-size: 28px;
    margin-bottom: 16px;
  }

  select, textarea {
    width: 100%;
    padding: 22px;
    font-size: 26px;
    border-radius: 14px;
    border: 1px solid #ccc;
    margin-bottom: 28px;
    box-sizing: border-box;
  }

  textarea {
    height: 200px; /* 作業内容欄を大きく */
  }

  .btn {
    width: 100%;
    padding: 34px;       /* ボタン縦をかなり大きく */
    margin: 18px 0;
    font-size: 32px;     /* ボタン文字も大きく */
    border-radius: 18px;
    border: none;
    color: #fff;
    box-sizing: border-box;
  }

  /* 有効時の色 */
  .arrival.enabled { background-color: #007bff; }
  .leave.enabled   { background-color: #dc3545; }

  /* 無効時の色（完全グレー） */
  .disabled {
    background-color: #cccccc !important;
    color: #666 !important;
  }

  #nowTime {
    font-size: 28px;
    margin-bottom: 28px;
  }
</style>
</head>
<body>

<h2>📍 現場名</h2>
<select id="siteName" onchange="enableArrival()">
  <option value="">現場を選択</option>
  <option value="工場A">工場A</option>
  <option value="工場B">工場B</option>
  <option value="店舗C">店舗C</option>
  <!-- 会社側でここに現場を追加していく -->
</select>

<h3>🕒 現在時刻</h3>
<div id="nowTime"></div>

<button id="arrivalBtn" class="btn arrival disabled" onclick="arrival()" disabled>
  現場到着（GPS打刻）
</button>

<button id="leaveBtn" class="btn leave disabled" onclick="leave()" disabled>
  現場退場（GPS打刻）
</button>

<h3>📝 作業内容</h3>
<textarea id="workNote" placeholder="今日の作業内容を入力"></textarea>

<script>
  // 現在時刻更新
  function updateTime() {
    const now = new Date();
    document.getElementById("nowTime").innerText =
      now.toLocaleString();
  }
  updateTime();
  setInterval(updateTime, 1000);

  // 現場名選択 → 到着ボタンを有効化
  function enableArrival() {
    const site = document.getElementById("siteName").value;
    const arrivalBtn = document.getElementById("arrivalBtn");

    if (site !== "") {
      arrivalBtn.disabled = false;
      arrivalBtn.classList.remove("disabled");
      arrivalBtn.classList.add("enabled");
    } else {
      arrivalBtn.disabled = true;
      arrivalBtn.classList.add("disabled");
      arrivalBtn.classList.remove("enabled");
    }
  }

  // 到着ボタン
  function arrival() {
    getGPS("arrival");

    const arrivalBtn = document.getElementById("arrivalBtn");
    arrivalBtn.disabled = true;
    arrivalBtn.classList.add("disabled");
    arrivalBtn.classList.remove("enabled");

    const leaveBtn = document.getElementById("leaveBtn");
    leaveBtn.disabled = false;
    leaveBtn.classList.remove("disabled");
    leaveBtn.classList.add("enabled");
  }

  // 退場ボタン
  function leave() {
    getGPS("leave");

    const leaveBtn = document.getElementById("leaveBtn");
    leaveBtn.disabled = true;
    leaveBtn.classList.add("disabled");
    leaveBtn.classList.remove("enabled");
  }

  // GPS取得（位置情報許可はブラウザ側の仕様）
  function getGPS(type) {
    navigator.geolocation.getCurrentPosition(() => {
      if (type === "arrival") {
        alert("今日もご安全に！");
      } else {
        alert("一日お疲れさまでした！");
      }
      // このあとに距離判定・保存処理を追加していける
    });
  }
</script>

</body>
</html>
