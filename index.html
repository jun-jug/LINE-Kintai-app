<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勤怠アプリ</title>
<style>
  body { font-family: sans-serif; padding: 20px; }

  .btn {
    width: 100%;
    padding: 20px;
    margin: 10px 0;
    font-size: 24px;
    border-radius: 10px;
    border: none;
    color: #fff;
  }

  /* 有効時の色 */
  .arrival.enabled { background-color: #007bff; }
  .leave.enabled { background-color: #dc3545; }

  /* 無効時の色（完全グレー） */
  .disabled {
    background-color: #cccccc !important;
    color: #666 !important;
  }
</style>
</head>
<body>

<h2>📍 現場名</h2>
<select id="siteName" style="width:100%; padding:10px; font-size:18px;" onchange="enableArrival()">
  <option value="">現場を選択</option>
  <option value="工場A">工場A</option>
  <option value="工場B">工場B</option>
  <option value="店舗C">店舗C</option>
</select>

<h3>🕒 現在時刻</h3>
<div id="nowTime" style="font-size:20px; margin-bottom:20px;"></div>

<button id="arrivalBtn" class="btn arrival disabled" onclick="arrival()" disabled>
  現場到着（GPS打刻）
</button>

<button id="leaveBtn" class="btn leave disabled" onclick="leave()" disabled>
  現場退場（GPS打刻）
</button>

<h3>📝 作業内容</h3>
<textarea id="workNote" placeholder="今日の作業内容を入力" 
  style="width:100%; height:120px; padding:10px; font-size:18px;"></textarea>

<h3>距離判定</h3>
<div id="distance">距離： --- m</div>
<div id="judge">判定： ---</div>

<script>
  // 現在時刻更新
  function updateTime() {
    const now = new Date();
    document.getElementById("nowTime").innerText =
      now.toLocaleString();
  }
  setInterval(updateTime, 1000);

  // 現場名選択 → 到着ボタンを有効化
  function enableArrival() {
    const site = document.getElementById("siteName").value;
    const arrivalBtn = document.getElementById("arrivalBtn");

    if (site !== "") {
      arrivalBtn.disabled = false;
      arrivalBtn.classList.remove("disabled");
      arrivalBtn.classList.add("enabled");
    } else {
      arrivalBtn.disabled = true;
      arrivalBtn.classList.add("disabled");
      arrivalBtn.classList.remove("enabled");
    }
  }

  // 到着ボタン
  function arrival() {
    getGPS("arrival");

    // 到着ボタンをグレー化
    const arrivalBtn = document.getElementById("arrivalBtn");
    arrivalBtn.disabled = true;
    arrivalBtn.classList.add("disabled");
    arrivalBtn.classList.remove("enabled");

    // 退場ボタンを有効化
    const leaveBtn = document.getElementById("leaveBtn");
    leaveBtn.disabled = false;
    leaveBtn.classList.remove("disabled");
    leaveBtn.classList.add("enabled");
  }

  // 退場ボタン
  function leave() {
    getGPS("leave");

    // 退場ボタンも押したらグレー化
    const leaveBtn = document.getElementById("leaveBtn");
    leaveBtn.disabled = true;
    leaveBtn.classList.add("disabled");
    leaveBtn.classList.remove("enabled");
  }

  // GPS取得
  function getGPS(type) {
    navigator.geolocation.getCurrentPosition((pos) => {

      // メッセージだけ表示（座標は出さない）
      if (type === "arrival") {
        alert("今日もご安全に！");
      } else {
        alert("一日お疲れさまでした！");
      }

      // ここに距離判定や保存処理を後で追加する
    });
  }
</script>

</body>
</html>
