<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勤怠アプリ</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
  }

  #appContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 24px;
    background: #f5f5f5;
    font-family: sans-serif;
    text-align: center;
    box-sizing: border-box;
    font-size: 34px;
  }

  h2, h3 {
    font-size: 36px;
    margin-bottom: 20px;
  }

  select, textarea {
    width: 85%;
    padding: 30px;
    font-size: 34px;
    border-radius: 20px;
    border: 1px solid #ccc;
    margin-bottom: 40px;
    box-sizing: border-box;
  }

  textarea {
    height: 350px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .btn {
    width: 85%;
    padding: 60px;
    margin: 26px auto;
    font-size: 40px;
    border-radius: 26px;
    border: none;
    color: #fff;
    display: block;
    box-sizing: border-box;
  }

  .arrival.enabled { background-color: #007bff; }
  .leave.enabled   { background-color: #dc3545; }

  .disabled {
    background-color: #cccccc !important;
    color: #666 !important;
  }

  #nowTime {
    font-size: 36px;
    margin-bottom: 30px;
  }
</style>
</head>
<body>

<div id="appContainer">

  <h2>📍 現場名</h2>
  <select id="siteName" onchange="enableArrival()">
    <option value="">現場を選択</option>
    <option value="工場A">工場A</option>
    <option value="工場B">工場B</option>
    <option value="店舗C">店舗C</option>
  </select>

  <h3>🕒 現在時刻</h3>
  <div id="nowTime"></div>

  <button id="arrivalBtn" class="btn arrival disabled" onclick="arrival()" disabled>
    現場到着（GPS打刻）
  </button>

  <button id="leaveBtn" class="btn leave disabled" onclick="leave()" disabled>
    現場退場（GPS打刻）
  </button>

  <h3>📝 作業内容</h3>
  <textarea id="workNote" placeholder="今日の作業内容を入力"></textarea>

</div>

<script>
  function updateTime() {
    const now = new Date();
    document.getElementById("nowTime").innerText =
      now.toLocaleString();
  }
  updateTime();
  setInterval(updateTime, 1000);

  function enableArrival() {
    const site = document.getElementById("siteName").value;
    const arrivalBtn = document.getElementById("arrivalBtn");

    if (site !== "") {
      arrivalBtn.disabled = false;
      arrivalBtn.classList.remove("disabled");
      arrivalBtn.classList.add("enabled");
    } else {
      arrivalBtn.disabled = true;
      arrivalBtn.classList.add("disabled");
      arrivalBtn.classList.remove("enabled");
    }
  }

  function arrival() {
    getGPS("arrival");

    const arrivalBtn = document.getElementById("arrivalBtn");
    arrivalBtn.disabled = true;
    arrivalBtn.classList.add("disabled");
    arrivalBtn.classList.remove("enabled");

    const leaveBtn = document.getElementById("leaveBtn");
    leaveBtn.disabled = false;
    leaveBtn.classList.remove("disabled");
    leaveBtn.classList.add("enabled");
  }

  function leave() {
    getGPS("leave");

    const leaveBtn = document.getElementById("leaveBtn");
    leaveBtn.disabled = true;
    leaveBtn.classList.add("disabled");
    leaveBtn.classList.remove("enabled");
  }

  function getGPS(type) {
    navigator.geolocation.getCurrentPosition(() => {
      if (type === "arrival") {
        alert("今日もご安全に！");
      } else {
        alert("一日お疲れさまでした！");
      }
    });
  }

  /* ★ キーボード閉じたら画面を強制リセット ★ */
  const textarea = document.getElementById("workNote");

  textarea.addEventListener("blur", () => {
    setTimeout(() => {
      window.scrollTo(0, 0);      // ← 画面位置を強制的に戻す
      document.body.style.height = "100%";  // ← viewport を再設定
    }, 100);
  });

  const textarea = document.getElementById("workNote");
  const app = document.getElementById("appContainer");

  textarea.addEventListener("blur", () => {

    // 少し待たないと iPhone が viewport を戻さない
    setTimeout(() => {

      // ① 現在の画面高さを再取得（iPhoneでも正しい値になる）
      const h = window.innerHeight;

      // ② 固定コンテナの高さを強制的に再設定
      app.style.height = h + "px";

      // ③ 画面位置を強制的に戻す
      window.scrollTo(0, 0);

    }, 150); // ← iPhoneは100〜200ms必要
  });
</script>

</body>
</html>
